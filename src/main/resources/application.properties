spring.application.name=textbuddy
management.endpoints.web.exposure.include=health,info
gg.jte.developmentMode=true
spring.mvc.throw-exception-if-no-handler-found=true

textbuddy.auth.enabled=false
textbuddy.llm.mode=${TEXTBUDDY_LLM_MODE:provider}
textbuddy.llm.base-url=${TEXTBUDDY_LLM_BASE_URL:}
textbuddy.llm.api-key=${TEXTBUDDY_LLM_API_KEY:}
textbuddy.llm.model=${TEXTBUDDY_LLM_MODEL:}
textbuddy.llm.timeout=${TEXTBUDDY_LLM_TIMEOUT:30s}
textbuddy.llm.temperature=${TEXTBUDDY_LLM_TEMPERATURE:0.2}
textbuddy.llm.max-retries=${TEXTBUDDY_LLM_MAX_RETRIES:1}
textbuddy.languagetool.mode=${TEXTBUDDY_LANGUAGETOOL_MODE:embedded}
textbuddy.languagetool.base-url=${TEXTBUDDY_LANGUAGETOOL_BASE_URL:}
textbuddy.languagetool.ngram-path=${TEXTBUDDY_LANGUAGETOOL_NGRAM_PATH:}
textbuddy.document.mode=${TEXTBUDDY_DOCUMENT_MODE:kreuzberg}
textbuddy.document.base-url=${TEXTBUDDY_DOCUMENT_BASE_URL:${TEXTBUDDY_DOCLING_BASE_URL:}}
textbuddy.document.api-key=${TEXTBUDDY_DOCUMENT_API_KEY:${TEXTBUDDY_DOCLING_API_KEY:}}
textbuddy.document.max-upload-size=${TEXTBUDDY_DOCUMENT_MAX_UPLOAD_SIZE:20MB}
textbuddy.document.timeout=${TEXTBUDDY_DOCUMENT_TIMEOUT:45s}
spring.servlet.multipart.max-file-size=${TEXTBUDDY_DOCUMENT_MAX_UPLOAD_SIZE:20MB}
spring.servlet.multipart.max-request-size=${TEXTBUDDY_DOCUMENT_MAX_UPLOAD_SIZE:20MB}

logging.level.root=INFO
logging.level.app.textbuddy=INFO
logging.level.org.springframework.security=INFO
