name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Build and test
        run: ./gradlew clean test verifyReleaseBundle installerZip

      - name: Upload failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-reports
          if-no-files-found: ignore
          path: |
            build/reports/**
            build/test-results/**
            frontend/**/test-results/**
            playwright/test-results/**
